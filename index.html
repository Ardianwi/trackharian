<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Success Path - 400M</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #18191a; color: #e4e6eb; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        .fb-card { background: #242526; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .fb-input { background: #3a3b3c; border: none; color: white; border-radius: 20px; padding: 10px 15px; }
        .fb-btn { background: #2374e1; transition: 0.2s; }
        .fb-btn:hover { background: #3982e4; }
        .progress-bar { background: linear-gradient(90deg, #2374e1, #00f2fe); transition: width 0.8s ease-in-out; }
    </style>
</head>
<body class="bg-[#18191a] pb-10">

    <div class="max-w-lg mx-auto p-4 space-y-5">
        
        <div class="fb-card p-4 text-center">
            <h1 class="text-xl font-bold text-[#2374e1]">Target: Rp 400.000.000</h1>
            <p id="quote-display" class="text-sm text-gray-400 mt-2 italic">"Konsistensi adalah kunci."</p>
            
            <div class="mt-4 bg-[#3a3b3c] h-4 rounded-full overflow-hidden border border-gray-600">
                <div id="progress-fill" class="progress-bar h-full" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-2 text-xs font-semibold">
                <span id="balance-text">Saldo: Rp 0</span>
                <span class="text-blue-400" id="percent-text">0%</span>
            </div>
        </div>

        <div class="fb-card p-4">
            <div class="flex gap-2">
                <input type="number" id="balance-input" placeholder="Update saldo terakhir..." class="fb-input flex-1 text-sm focus:outline-none">
                <button onclick="updateBalance()" class="fb-btn text-white px-4 py-2 rounded-lg text-sm font-bold">Simpan</button>
            </div>
        </div>

        <div class="fb-card p-4">
            <h2 class="font-bold border-b border-gray-700 pb-2 mb-3">Tugas Hari Ini</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="todo-input" placeholder="Apa rencana hari ini?" class="fb-input flex-1 text-sm focus:outline-none">
                <button onclick="addTodo()" class="bg-[#42b72a] text-white px-4 py-2 rounded-lg font-bold">+</button>
            </div>
            <ul id="todo-list" class="space-y-2"></ul>
        </div>

        <div class="fb-card p-4">
            <div class="flex gap-2 mb-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-teal-400 flex items-center justify-center font-bold">A</div>
                <textarea id="status-input" placeholder="Apa yang kamu pikirkan atau capai hari ini?" class="fb-input flex-1 text-sm h-12 resize-none focus:outline-none"></textarea>
            </div>
            <button onclick="postStatus()" class="w-full fb-btn text-white py-2 rounded-lg font-bold">Posting Status</button>
        </div>

        <div id="status-feed" class="space-y-4">
            </div>

    </div>

    <script>
        let balance = localStorage.getItem('fb_balance') || 0;
        let todos = JSON.parse(localStorage.getItem('fb_todos')) || [];
        let posts = JSON.parse(localStorage.getItem('fb_posts')) || [];

        const quotes = [
            "Harta tidak datang sendiri, dia datang ke orang yang disiplin.",
            "Rp 400 Juta dimulai dari Rp 100.000 pertama.",
            "Jangan bandingkan dirimu dengan orang lain, bandingkan dengan dirimu kemarin.",
            "Setiap postingan adalah jejak perjuanganmu.",
            "Fokus pada aset, bukan liabilitas."
        ];

        function init() {
            updateUI();
            renderTodos();
            renderPosts();
            document.getElementById('quote-display').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }

        function updateBalance() {
            const val = document.getElementById('balance-input').value;
            if (val !== "") {
                balance = parseInt(val);
                localStorage.setItem('fb_balance', balance);
                updateUI();
                document.getElementById('balance-input').value = "";
            }
        }

        function updateUI() {
            const target = 400000000;
            const percentage = Math.min((balance / target) * 100, 100).toFixed(2);
            document.getElementById('balance-text').innerText = `Saldo: Rp ${parseInt(balance).toLocaleString('id-ID')}`;
            document.getElementById('percent-text').innerText = percentage + "%";
            document.getElementById('progress-fill').style.width = percentage + "%";
        }

        // --- ToDo Logic ---
        function addTodo() {
            const input = document.getElementById('todo-input');
            if (input.value.trim() !== "") {
                todos.unshift({ text: input.value, done: false });
                input.value = "";
                saveAndRenderTodos();
            }
        }

        function toggleTodo(i) {
            todos[i].done = !todos[i].done;
            saveAndRenderTodos();
        }

        function saveAndRenderTodos() {
            localStorage.setItem('fb_todos', JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = todos.map((t, i) => `
                <li class="flex items-center justify-between p-2 bg-[#3a3b3c]/30 rounded-lg">
                    <span onclick="toggleTodo(${i})" class="cursor-pointer text-sm ${t.done ? 'line-through text-gray-500' : ''}">${t.text}</span>
                    <button onclick="todos.splice(${i},1);saveAndRenderTodos()" class="text-xs text-red-500">Hapus</button>
                </li>
            `).join('');
        }

        // --- Facebook Status Logic ---
        function postStatus() {
            const input = document.getElementById('status-input');
            if (input.value.trim() !== "") {
                const now = new Date();
                const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                
                posts.unshift({
                    content: input.value,
                    date: `${dateStr} • ${timeStr}`,
                    currentBalance: balance
                });
                
                input.value = "";
                localStorage.setItem('fb_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts() {
            const feed = document.getElementById('status-feed');
            feed.innerHTML = posts.map((p, i) => `
                <div class="fb-card p-4 animate-in fade-in duration-500">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg">A</div>
                        <div>
                            <p class="text-sm font-bold">Ardian Wicaksono <span class="text-xs font-normal text-gray-400">mengupdate progres.</span></p>
                            <p class="text-[11px] text-gray-400">${p.date}</p>
                        </div>
                    </div>
                    <p class="text-sm leading-relaxed mb-3">${p.content.replace(/\n/g, '<br>')}</p>
                    <div class="border-t border-gray-700 pt-2 flex justify-between items-center">
                        <span class="text-[10px] text-blue-400 font-bold uppercase tracking-tighter">Pencapaian: Rp ${parseInt(p.currentBalance).toLocaleString('id-ID')}</span>
                        <button onclick="posts.splice(${i},1);localStorage.setItem('fb_posts', JSON.stringify(posts));renderPosts()" class="text-[10px] text-gray-500 hover:underline text-red-400">Hapus Post</button>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
